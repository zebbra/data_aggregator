name: Helm

on:
  push:
    paths:
      - "helm/charts/aggregator/**"

jobs:
  publish:
    name: Publish Helm chart
    runs-on: hetzner

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Run Helm lint
        run: |
          helm lint helm/charts/aggregator

      - name: Login to Quay.io
        run: |
          helm registry login quay.io \
            --username ${{ secrets.QUAY_USERNAME }} \
            --password ${{ secrets.QUAY_PASSWORD }}

      - name: Package and push Helm chart
        run: |
          echo "Packaging and pushing Helm chart..."
          CHART_FILE=$(helm package helm/charts/aggregator | awk -F': ' '{print $2}')
          helm push "$CHART_FILE" oci://quay.io/zebbra/charts

  dispatch:
    runs-on: hetzner
    permissions:
      contents: write

    steps:
      - name: dispatch
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.DEPLOYMENT_REPO_DISPATCH_PAT }}
          repository: zebbra/data_aggregator_deployment
          event-type: update_helm_chart
