apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "data_aggregator.fullname" . }}
  labels:
    {{- include "data_aggregator.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "data_aggregator.serviceAccountName" . }}
roleRef:
  kind: Role
  name: {{ include "data_aggregator.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
