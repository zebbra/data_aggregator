apiVersion: v1
kind: Service
metadata:
  name: {{ include "data_aggregator.fullname" . }}-headless
  labels:
    {{- include "data_aggregator.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "data_aggregator.selectorLabels" . | nindent 4 }}
